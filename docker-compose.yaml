services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: coworking_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: user.cuscatlan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/coworking_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: user.cuscatlan
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

volumes:
  pgdata: