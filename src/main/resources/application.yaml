spring:
  profiles:
    active: dev
  application:
    name: cuscatlan
  cache:
    type: simple

app:
    jwt:
      secret: dGhpc2lzYXZlcnlsb25nc2VjcmV0a2V5Zm9yand0c2lnbmluZ3B1cnBvc2Vz
      expiration-minutes: 60
    payment-gateway:
      base-url: http://localhost:8080/mock/payment
      timeout-ms: 2000

resilience4j:
  circuitbreaker:
    instances:
      paymentValidation:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-closed-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,circuitbreakerevents
  health:
    circuitbreakers:
      enabled: true